# /etc/nginx/sites-available/erp-backend.conf
# Nginx reverse proxy for ERP backend on VPS
# After editing: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name api.your-domain.com;   # <-- Replace with your backend domain/subdomain

    # Redirect HTTP → HTTPS (uncomment after SSL setup)
    # return 301 https://$host$request_uri;

    # File upload size limit (match backend: 10MB)
    client_max_body_size 12M;

    # API proxy
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket support (Socket.io)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}

