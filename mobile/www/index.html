<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6B4FCF">
  <title>Sabt CRM</title>
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: #6B4FCF;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #fff;
      display: flex; align-items: center; justify-content: center;
    }
    .loader {
      text-align: center;
    }
    .logo {
      font-size: 42px;
      font-weight: 900;
      letter-spacing: -1px;
      margin-bottom: 24px;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.25);
      border-top-color: #fff;
      border-radius: 50%;
      margin: 0 auto;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Capacitor's `server.url` overrides this — but if it ever fails to load
       (offline / DNS issue), the user sees this fallback splash. -->
  <div class="loader">
    <div class="logo">sabt<span style="color:#ef4444">·</span></div>
    <div class="spinner"></div>
    <p style="margin-top:18px;font-size:13px;opacity:.8;">Загрузка приложения…</p>
  </div>
</body>
</html>
